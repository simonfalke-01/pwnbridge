version: 2

project_name: pwnbridge

before:
  hooks:
    - ./packaging/release/prepare.sh

builds:
  - id: pwnbridge
    main: ./cmd/pwnbridge
    binary: pwnbridge
    goos: [darwin]
    goarch: [arm64, amd64]
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w
      - -X github.com/pwnbridge/pwnbridge/internal/version.Version={{.Version}}
      - -X github.com/pwnbridge/pwnbridge/internal/version.Commit={{.Commit}}
      - -X github.com/pwnbridge/pwnbridge/internal/version.Date={{.CommitDate}}
  - id: pwnbridge-agent
    main: ./cmd/pwnbridge-agent
    binary: pwnbridge-agent-linux-amd64
    goos: [linux]
    goarch: [amd64]
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w
      - -X github.com/pwnbridge/pwnbridge/internal/version.Version={{.Version}}
      - -X github.com/pwnbridge/pwnbridge/internal/version.Commit={{.Commit}}
      - -X github.com/pwnbridge/pwnbridge/internal/version.Date={{.CommitDate}}

archives:
  - id: client
    ids: [pwnbridge]
    formats: [tar.gz]
    builds_info:
      mode: 0755
      # A non-zero constant keeps local snapshots reproducible even when the
      # checkout has no configured Git remote and GoReleaser cannot populate
      # CommitDate. Version metadata still carries the real commit date in
      # normal tagged CI releases.
      mtime: &archive_mtime '1970-01-01T00:00:00Z'
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - src: README.md
        info:
          mtime: *archive_mtime
      - src: PLAN.md
        info:
          mtime: *archive_mtime
      - src: CONTRIBUTING.md
        info:
          mtime: *archive_mtime
      - src: LICENSE
        info:
          mtime: *archive_mtime
      - src: docs/*.md
        info:
          mtime: *archive_mtime
      - src: packaging/release/generated/*
        dst: completions
        strip_parent: true
        info:
          mtime: *archive_mtime
      - src: dist/pwnbridge-agent_linux_amd64_v1/pwnbridge-agent-linux-amd64
        dst: .
        strip_parent: true
        info:
          mode: 0755
          mtime: *archive_mtime
  - id: agent
    ids: [pwnbridge-agent]
    formats: [tar.gz]
    builds_info:
      mode: 0755
      mtime: *archive_mtime
    name_template: >-
      {{ .ProjectName }}-agent_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - src: LICENSE
        info:
          mtime: *archive_mtime

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive
    disable: false

changelog:
  sort: asc
  filters:
    exclude: ['^docs:', '^test:']

release:
  draft: true

report_sizes: true
