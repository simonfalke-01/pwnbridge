name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [macos-14, ubuntu-latest]
        go: ['1.25.12', '1.26.5']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: make verify
      - run: make test-race

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - run: make fuzz-smoke FUZZTIME=15s

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - run: make security GOVULNCHECK_VERSION=v1.6.0 GOSEC_VERSION=v2.27.1

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: packaging/container
          platforms: linux/amd64
          push: false

  release-snapshot:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
      - uses: anchore/sbom-action/download-syft@v0.24.0
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.15.4
          args: release --snapshot --clean
